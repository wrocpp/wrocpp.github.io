# Paper-level C++26 (and adjacent) feature support, for the
# /toolset/compiler-support/ matrix. Per-example rows live in
# godbolt-permalinks.yml; this file covers features without (or in
# addition to) a wro.cpp-authored example.
#
# Status values: works | partial | planned | experimental | none
#
# Update cadence: ~quarterly, or on major compiler release.

P2996:
  title: Reflection
  paper_url: https://wg21.link/P2996
  status:
    clang-p2996: works
    gcc-16.1: works
    msvc: planned
    edg: experimental
  notes: "GCC 16.1 ships <meta>; clang-p2996 ships <experimental/meta> (alias for <meta>)."
  examples:
    - why-cpp26-reflection-matters.teaser
    - first-reflection.describe
  last_reviewed: 2026-05-02

P3394:
  title: Annotations for reflection
  paper_url: https://wg21.link/P3394
  status:
    clang-p2996: works
    gcc-16.1: partial
    msvc: planned
    edg: none
  notes: "GCC 16.1 spells the query `annotations_of_with_type`; clang-p2996 spells it `annotation_of_type`. Source-level divergence."
  examples:
    - why-cpp26-reflection-matters.teaser_annotated
  last_reviewed: 2026-05-02

