memory-safety-cpp26-and-beyond:
  reflect_profile:
    title: Reflection-driven basic safety profile (clang-p2996)
    id: 11Earja19
    url: https://godbolt.org/z/11Earja19
    expected_output: 'GoodSession passes the basic safety profile check.

      Try uncommenting BadSession* in the source to see the

      static_assert fire with the profile-violation reason.'
  cppfront_safety:
    title: cppfront -- safety by default (CMake + cpp2 -> cpp1 -> binary, executes)
    id: K853f7x8v
    url: https://godbolt.org/z/K853f7x8v
    expected_output: |-
      Program returned: 1
      /app/test.cpp2(20) int main(): Bounds safety violation: out of bounds access attempt detected - attempted access at index 5, [min,max] range is [0,2]
      items[1]: 20
    # Uses godbolt's CMake project mode with the JohelEGP jegp.cmake_modules
    # library that wires cppfront into the CMake pipeline (test.cpp2 ->
    # cppfront translates to .cpp -> gsnapshot/GCC compiles -> executor
    # runs the binary). The plain cpp2_cppfront language entry on godbolt
    # is build-only; this CMake-tree shape is what gets you a runnable
    # binary on godbolt for cppfront examples. Source for the JEGP CMake
    # modules is in the godbolt session's tree (not a wro.cpp dependency).
testing-for-safety-2026:
  reflect_arbitrary:
    title: arbitrary<T> + round-trip property tests (clang-p2996)
    id: q4b5a439M
    url: https://godbolt.org/z/q4b5a439M
    expected_output: |-
      == reflection-driven property tests for SensorReading ==
      == 54 samples generated by arbitrary<T> ==
        P1 value round-trip (54 samples, 0 failed): PASS
        P2 byte round-trip (54 samples): PASS
        P3 truncated refused (lengths 0..6): PASS
      --
      overall: PASS
  reflect_pretty_diff:
    title: pretty_diff field-level test diagnostics (clang-p2996)
    id: 3n634TqMb
    url: https://godbolt.org/z/3n634TqMb
    expected_output: |-
      == without reflection ==
      FAIL: SensorReading != SensorReading

      == with reflection ==
      FAIL: SensorReading mismatch:
        raw_value: 12345 != 12344

      == full dump (any struct, no per-type code) ==
      expected:
        sensor_id = 42
        raw_value = 12345
        status_flags = 15

      actual:
        sensor_id = 42
        raw_value = 12344
        status_flags = 15
