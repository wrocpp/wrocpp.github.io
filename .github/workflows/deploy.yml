# Builds the Astro site and deploys to GitHub Pages.
#
# Triggers:
#   1. Push to main              — normal edit/commit flow.
#   2. Daily cron (07:00 UTC)    — picks up scheduled posts crossing pubDate.
#   3. Manual (workflow_dispatch) — operator override.
#
# No untrusted inputs are passed to `run:` steps; this workflow only consumes
# its own action outputs and the repo checkout, so there's no injection surface.

name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: {}

concurrency:
  group: 'pages'
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
