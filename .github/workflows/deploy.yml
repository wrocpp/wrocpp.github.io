# Builds the Astro site and deploys to GitHub Pages.
#
# Triggers:
#   1. Push to main              — normal edit/commit flow.
#   2. Daily cron (07:00 UTC)    — picks up scheduled posts crossing pubDate.
#   3. Manual (workflow_dispatch) — operator override.
#
# No untrusted inputs are passed to `run:` steps; this workflow only consumes
# its own action outputs and the repo checkout, so there's no injection surface.

name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    # Three staggered daily builds. GitHub-Actions free-tier scheduled
    # runners drift up to several hours late under load, which
    # repeatedly missed Buffer fires at 08:00 UTC for posts whose
    # `pubDate` rolled over at 00:00 UTC the same day. Even with the
    # 05:30 UTC backup added in PR #79, the 2026-05-18 fire still
    # required a manual deploy. The 03:30 UTC defensive third trigger
    # gives ~4 hr of total drift absorption before any pre-Buffer
    # cron guard hits at 07:45 UTC. Three runs/day stays well under
    # the free-tier quota and is harmless when all succeed (the
    # `concurrency: pages, cancel-in-progress: false` group below
    # serialises them; duplicate builds get a fresh dist with the same
    # source so the deploy is idempotent).
    - cron: '0 7 * * *'
    - cron: '30 5 * * *'
    - cron: '30 3 * * *'
  workflow_dispatch: {}

concurrency:
  group: 'pages'
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        env:
          NODE_ENV: production
          # Astro inlines vars prefixed with PUBLIC_ at build time. The GA4
          # measurement ID is non-secret (visible in client HTML) but lives
          # in repo secrets so forks do not inherit it.
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
